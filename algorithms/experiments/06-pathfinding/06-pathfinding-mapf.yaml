algorithms:
  Follower:
    name: Follower
  #LaCAM:
  #  name: LaCAM
environment:
  collision_system: soft
  map_name:
    grid_search: [Berlin_1_256, Boston_0_256, London_2_256, Milan_0_256, Moscow_0_256,
      NewYork_1_256, Paris_1_256, Paris_2_256]
  max_episode_steps: 2048
  name: Environment
  num_agents: 128
  num_charges: 
    grid_search: [32, 64]
  observation_type: MAPF
  on_target: nothing
  seed: 0
  with_animation: true
results_views:
  TabularMakespan:
    drop_keys: [seed, ISR, CSR, SoC, runtime, ep_length, avg_agents_density, map_name,
      a_collisions, o_collisions]
    print_results: true
    round_digits: 2
    type: tabular
  TabularView1:
    drop_keys: [seed, map_name]
    print_results: true
    type: tabular